name: output demo 
on: push 
jobs: 
    build:
        outputs:
          version: ${{steps.step1.outputs.version}}
        runs-on: ubuntu-latest
        steps: 
            - name: step one
              id: step1
              run: echo "version=0.0.1" >> $GITHUB_OUTPUT
              
            - name: step twp 
              run: echo " this is version ${{steps.step1.outputs.version}}"
    deploy:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name: deploy the app
          run: echo" we are deploying the app with version ${{needs.build.outputs.version}}


