name: Input demo
on: 
    workflow_dispatch:
        inputs:
            environment:
                description: choose enviorment to deploy
                required: true
                default: dev
                type: choice
                options:
                    - test
                    - dev 
                    - prod
            artifact_tag: 
                description: choose git tag to deploy
                required: true
jobs:
    inputs-demo:
        runs-on: ubuntu-latest
        steps:
            - name: deploy the app
              run: echo " deploying the ${{inputs.artifact_tag}} application to ${{inputs.environment}}"
