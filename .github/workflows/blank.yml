name: Hello world
on: 
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main 
jobs: 
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: greeting statement
        run: |
          echo "hi "
          echo "welcome to git hub actions "
  
  build: 
    runs-on: ubuntu-latest
    needs: hello
    steps:
      - name: build step 
        run: echo " this is demo build "
  test:
    runs-on: ubuntu-latest
    needs: build 
    steps:
      - name: test
        run: echo " this is demo test "
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: test
        run: echo " this is test "
